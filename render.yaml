services:
  - type: web
    name: medicare-backend
    env: python
    region: oregon
    plan: free
    rootDir: MAINN/backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health