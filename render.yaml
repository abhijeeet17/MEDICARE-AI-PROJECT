services:
  # Backend API Service
  - type: web
    name: medicare-backend
    env: python
    region: oregon
    plan: starter
    rootDir: MAINN/backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
    healthCheckPath: /health
    disk:
      name: backend-data
      mountPath: /opt/render/project/src
      sizeGB: 1

  # Frontend Web Service (Static Site)
  - type: static
    name: medicare-frontend
    env: static
    region: oregon
    plan: starter
    rootDir: MAINN/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
